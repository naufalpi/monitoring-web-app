services:
  db:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    environment:
      NODE_ENV: production
    restart: unless-stopped
    volumes:
      - storage:/storage:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    environment:
      NODE_ENV: production
    restart: unless-stopped
    volumes:
      - storage:/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
