services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: deps
    command: ["sh", "-c", "npx prisma generate && npx nodemon --legacy-watch src/server/index.js"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./frontend/public:/app/frontend/public
      - storage:/storage

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: deps
    command: ["sh", "-c", "npx prisma generate && npx nodemon --legacy-watch src/monitoring/worker.js"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - storage:/storage

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: deps
    command: ["npm", "run", "dev:ui", "--", "--host", "0.0.0.0"]
    depends_on:
      - web
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      VITE_API_PROXY_TARGET: "http://web:3000"
    volumes:
      - ./frontend:/app/frontend
      - ./vite.config.js:/app/vite.config.js

  adminer:
    image: adminer:4
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
